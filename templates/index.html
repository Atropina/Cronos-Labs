<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analisador de Exames</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #e2e8f0;
      --primary: #2563eb;
      --primary-light: #dbeafe;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --success-light: #dcfce7;
      --danger: #dc2626;
      --danger-light: #fee2e2;
      --text: #0f172a;
      --text-muted: #64748b;
      --text-light: #94a3b8;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg: 0 4px 6px rgba(0,0,0,.07), 0 10px 40px rgba(0,0,0,.1);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── HEADER ── */
    header {
      max-width: 960px;
      margin: 0 auto 32px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 44px; height: 44px;
      background: var(--primary);
      border-radius: 10px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }

    .logo svg { color: #fff; }

    header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -.3px; }
    header p  { font-size: .85rem; color: var(--text-muted); margin-top: 2px; }

    /* ── MAIN CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      max-width: 960px;
      margin: 0 auto 24px;
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header h2 { font-size: 1rem; font-weight: 600; }
    .card-header span { font-size: .8rem; color: var(--text-muted); }

    /* ── DROPZONE ── */
    .dropzone {
      margin: 24px;
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      background: var(--surface2);
    }

    .dropzone:hover, .dropzone.drag-over {
      border-color: var(--primary);
      background: var(--primary-light);
    }

    .dropzone svg { color: var(--primary); margin-bottom: 14px; }

    .dropzone h3 { font-size: 1rem; font-weight: 600; margin-bottom: 6px; }
    .dropzone p  { font-size: .85rem; color: var(--text-muted); }

    .dropzone input[type="file"] { display: none; }

    .btn-select {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 18px;
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }

    .btn-select:hover { background: var(--primary-dark); }

    /* ── FILE LIST ── */
    #file-list {
      margin: 0 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      animation: slideIn .2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .file-icon {
      width: 36px; height: 36px;
      background: #fee2e2;
      border-radius: 8px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }

    .file-icon svg { color: #dc2626; }

    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: .875rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-size { font-size: .78rem; color: var(--text-muted); margin-top: 1px; }

    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      padding: 4px;
      border-radius: 6px;
      transition: color .15s, background .15s;
      display: grid; place-items: center;
    }

    .btn-remove:hover { color: var(--danger); background: var(--danger-light); }

    /* ── ACTIONS ── */
    .actions {
      padding: 0 24px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn-process {
      padding: 10px 24px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-process:hover:not(:disabled) { background: var(--primary-dark); }
    .btn-process:active:not(:disabled) { transform: scale(.98); }
    .btn-process:disabled { opacity: .55; cursor: not-allowed; }

    .btn-clear {
      padding: 10px 18px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .9rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color .15s, color .15s;
    }

    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }

    /* ── SPINNER ── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── RESULTS ── */
    #results { max-width: 960px; margin: 0 auto; }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin-bottom: 16px;
      animation: slideIn .3s ease;
    }

    .result-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .date-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .date-badge svg { color: var(--primary); }

    .date-badge h3 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }

    .exam-count {
      font-size: .78rem;
      background: var(--primary-light);
      color: var(--primary);
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 500;
    }

    .result-actions { display: flex; gap: 8px; }

    .btn-copy, .btn-download {
      padding: 6px 12px;
      border-radius: 7px;
      font-size: .8rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .btn-copy {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .btn-copy:hover { background: var(--border); }
    .btn-copy.copied { background: var(--success-light); border-color: var(--success); color: var(--success); }

    .btn-download {
      background: var(--primary-light);
      border: 1px solid #bfdbfe;
      color: var(--primary);
    }

    .btn-download:hover { background: #bfdbfe; }

    /* ── EXAM TABLE ── */
    .exam-table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .85rem;
    }

    thead th {
      background: var(--surface2);
      padding: 10px 16px;
      text-align: left;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--text-muted);
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 11px 16px;
      vertical-align: middle;
      color: var(--text);
    }

    td.cat-badge span {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 500;
      background: var(--primary-light);
      color: var(--primary-dark);
    }

    /* ── category separator rows ── */
    tr.cat-row td {
      padding: 8px 16px 6px;
      background: var(--surface2);
      border-top: 2px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    tr.cat-row:first-child td { border-top: none; }

    .cat-group-label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .7px;
      color: var(--primary);
    }

    td.value-cell { font-weight: 600; font-variant-numeric: tabular-nums; }

    .dual-sep {
      margin: 0 5px;
      color: var(--text-light);
      font-weight: 400;
    }

    .pct-val {
      color: #0369a1;
      font-weight: 600;
    }

    .pct-ref {
      font-size: .82rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ── JSON TOGGLE ── */
    .json-toggle {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      font-size: .82rem;
      color: var(--text-muted);
      user-select: none;
      transition: background .15s;
    }

    .json-toggle:hover { background: var(--surface2); }

    .json-toggle svg { transition: transform .25s; }
    .json-toggle.open svg { transform: rotate(180deg); }

    .json-block {
      display: none;
      padding: 0 20px 20px;
    }

    .json-block.open { display: block; }

    pre {
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 18px;
      overflow-x: auto;
      font-size: .82rem;
      line-height: 1.6;
      font-family: "Fira Code", "JetBrains Mono", "Cascadia Code", monospace;
    }

    /* JSON colors */
    .json-key    { color: #93c5fd; }
    .json-str    { color: #86efac; }
    .json-num    { color: #fda4af; }
    .json-bool   { color: #c4b5fd; }
    .json-null   { color: #94a3b8; }

    /* ── ERROR ── */
    .error-card {
      background: var(--danger-light);
      border: 1px solid #fca5a5;
      border-radius: var(--radius);
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      max-width: 960px;
      margin: 0 auto;
    }

    .error-card svg { color: var(--danger); flex-shrink: 0; margin-top: 1px; }
    .error-card p { font-size: .9rem; color: #991b1b; }

    /* ── EXPORT BAR ── */
    .export-bar {
      max-width: 960px;
      margin: 0 auto 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      box-shadow: var(--shadow);
    }

    .export-summary { font-size: .88rem; color: var(--text-muted); }
    .export-summary strong { color: var(--text); }

    /* ── CACHE INFO ── */
    .cache-info {
      max-width: 960px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: .82rem;
      color: #0369a1;
      background: #e0f2fe;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      padding: 8px 14px;
    }

    .cache-info svg { flex-shrink: 0; }

    /* ── WARNING ── */
    .warn-card {
      background: #fffbeb;
      border: 1px solid #fcd34d;
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      max-width: 960px;
      margin: 0 auto 16px;
    }

    .warn-card svg { color: #d97706; flex-shrink: 0; margin-top: 2px; }
    .warn-card strong { font-size: .88rem; color: #92400e; }
    .warn-card ul { margin: 6px 0 0 16px; font-size: .82rem; color: #92400e; }

    /* ── EMPTY ── */
    .empty-hint {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-muted);
      font-size: .9rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M9 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2h-4"/>
        <rect x="9" y="1" width="6" height="4" rx="1"/>
        <line x1="12" y1="11" x2="12" y2="17"/>
        <line x1="9" y1="14" x2="15" y2="14"/>
      </svg>
    </div>
    <div>
      <h1>Analisador de Exames Médicos</h1>
      <p>Faça upload de PDFs de exames e extraia os resultados em JSON estruturado</p>
    </div>
  </header>

  <!-- Upload card -->
  <div class="card">
    <div class="card-header">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <h2>Arquivos PDF</h2>
      <span>· sem limite de tamanho</span>
    </div>

    <div class="dropzone" id="dropzone">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
        <polyline points="16 16 12 12 8 16"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
      </svg>
      <h3>Arraste e solte os PDFs aqui</h3>
      <p>ou clique para selecionar arquivos</p>
      <label class="btn-select">
        Selecionar PDFs
        <input type="file" id="file-input" accept=".pdf" multiple />
      </label>
    </div>

    <div id="file-list"></div>

    <div class="actions">
      <button class="btn-process" id="btn-process" disabled>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="btn-label">Analisar Exames</span>
        <span class="spinner" id="spinner"></span>
      </button>
      <button class="btn-clear" id="btn-clear">Limpar</button>
    </div>
  </div>

  <!-- Results -->
  <div id="results"></div>

  <script>
    const dropzone    = document.getElementById('dropzone');
    const fileInput   = document.getElementById('file-input');
    const fileList    = document.getElementById('file-list');
    const btnProcess  = document.getElementById('btn-process');
    const btnClear    = document.getElementById('btn-clear');
    const spinner     = document.getElementById('spinner');
    const results     = document.getElementById('results');
    const btnLabel    = document.querySelector('.btn-label');

    let files = [];

    /* ── drag & drop ── */
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('drag-over');
      addFiles([...e.dataTransfer.files].filter(f => f.type === 'application/pdf'));
    });
    dropzone.addEventListener('click', e => {
      if (!e.target.closest('label')) fileInput.click();
    });
    fileInput.addEventListener('change', () => {
      addFiles([...fileInput.files]);
      fileInput.value = '';
    });

    function addFiles(newFiles) {
      newFiles.forEach(f => {
        if (!files.find(x => x.name === f.name && x.size === f.size)) files.push(f);
      });
      renderFileList();
    }

    function renderFileList() {
      fileList.innerHTML = '';
      files.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <div class="file-icon">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
            </svg>
          </div>
          <div class="file-info">
            <div class="file-name">${f.name}</div>
            <div class="file-size">${formatSize(f.size)}</div>
          </div>
          <button class="btn-remove" title="Remover" data-idx="${i}">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>`;
        fileList.appendChild(item);
      });

      fileList.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', () => {
          files.splice(+btn.dataset.idx, 1);
          renderFileList();
        });
      });

      btnProcess.disabled = files.length === 0;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    /* ── clear ── */
    btnClear.addEventListener('click', () => {
      files = [];
      renderFileList();
      results.innerHTML = '';
    });

    /* ── process ── */
    btnProcess.addEventListener('click', async () => {
      if (!files.length) return;

      setLoading(true);
      results.innerHTML = '';

      const fd = new FormData();
      files.forEach(f => fd.append('files', f));

      try {
        const res  = await fetch('/process', { method: 'POST', body: fd });
        const json = await res.json();

        if (!res.ok || json.error) {
          showError(json.error || 'Erro desconhecido');
        } else if (json.success && json.data) {
          if (json.errors && json.errors.length) showWarnings(json.errors);
          if (json.cached > 0) showCacheInfo(json.cached, json.total);
          renderResults(json.data);
        } else {
          showError(json.error || 'Resposta inválida do servidor');
        }
      } catch (err) {
        showError('Falha na comunicação com o servidor: ' + err.message);
      } finally {
        setLoading(false);
      }
    });

    function setLoading(on) {
      btnProcess.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
      btnLabel.textContent  = on ? 'Analisando…' : 'Analisar Exames';
    }

    function showCacheInfo(cached, total) {
      const div = document.createElement('div');
      div.className = 'cache-info';
      div.innerHTML = `
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        ${cached} de ${total} arquivo${total !== 1 ? 's' : ''} carregado${cached !== 1 ? 's' : ''} do cache local — sem nova chamada à OpenAI`;
      results.appendChild(div);
    }

    /* merge datas duplicadas que possam vir da API */
    function mergeByDate(data) {
      const merged = {};
      for (const [date, exams] of Object.entries(data)) {
        if (merged[date]) Object.assign(merged[date], exams);
        else merged[date] = { ...exams };
      }
      return merged;
    }

    /* agrupa entradas de exame por categoria */
    function groupByCategory(examEntries) {
      const groups = {};
      for (const [key, exam] of examEntries) {
        const cat = exam.categoria || 'Outros';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push([key, exam]);
      }
      return groups;
    }

    /* ── render results ── */
    function renderResults(rawData) {
      const data = mergeByDate(rawData);

      if (!Object.keys(data).length) {
        results.innerHTML = '<div class="empty-hint">Nenhum exame encontrado nos arquivos enviados.</div>';
        return;
      }

      const fullJson = JSON.stringify(data, null, 2);
      const totalExams = Object.values(data).reduce((s, e) => s + Object.keys(e).length, 0);

      const exportBar = document.createElement('div');
      exportBar.className = 'export-bar';
      exportBar.innerHTML = `
        <span class="export-summary">
          <strong>${Object.keys(data).length}</strong> data${Object.keys(data).length !== 1 ? 's' : ''} ·
          <strong>${totalExams}</strong> exames no total
        </span>
        <div style="display:flex;gap:8px">
          <button class="btn-copy export-copy" data-json='${escAttr(fullJson)}'>
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copiar JSON completo
          </button>
          <button class="btn-download export-dl" data-json='${escAttr(fullJson)}'>
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            Download JSON completo
          </button>
        </div>`;
      results.appendChild(exportBar);

      exportBar.querySelector('.export-copy').addEventListener('click', function () {
        navigator.clipboard.writeText(this.dataset.json).then(() => {
          const orig = this.innerHTML;
          this.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copiado!`;
          this.classList.add('copied');
          setTimeout(() => { this.innerHTML = orig; this.classList.remove('copied'); }, 2000);
        });
      });

      exportBar.querySelector('.export-dl').addEventListener('click', function () {
        const blob = new Blob([this.dataset.json], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'exames_completo.json';
        a.click();
      });

      Object.entries(data).sort(sortDates).forEach(([date, exams]) => {
        const examEntries = Object.entries(exams);
        const byCategory  = groupByCategory(examEntries);
        const safeId      = date.replace(/[^a-z0-9]/gi, '_');
        const card        = document.createElement('div');
        card.className    = 'result-card';

        const jsonStr = JSON.stringify({ [date]: exams }, null, 2);

        const tableRows = Object.entries(byCategory).map(([cat, entries]) => `
          <tr class="cat-row">
            <td colspan="5">
              <span class="cat-group-label">${cat}</span>
            </td>
          </tr>
          ${entries.map(([, e]) => {
            const hasPct = e.valor_percentual != null && e.valor_percentual !== '';
            const valorCell = hasPct
              ? `${e.valor ?? '—'} <span class="dual-sep">/</span> <span class="pct-val">${e.valor_percentual}${e.unidade_percentual ? ' ' + e.unidade_percentual : '%'}</span>`
              : (e.valor ?? '—');
            const unidadeCell = hasPct
              ? `${e.unidade || '—'} <span class="dual-sep">/</span> <span class="pct-val">${e.unidade_percentual || '%'}</span>`
              : (e.unidade || '—');
            const refCell = hasPct && e.referencia_percentual
              ? `${e.valor_referencia || '—'} <span class="dual-sep">/</span> <span class="pct-ref">${e.referencia_percentual}%</span>`
              : (e.valor_referencia || '—');
            return `
            <tr>
              <td>${e.nome || '—'}</td>
              <td class="value-cell">${valorCell}</td>
              <td>${unidadeCell}</td>
              <td>${refCell}</td>
            </tr>`;
          }).join('')}
        `).join('');

        card.innerHTML = `
          <div class="result-header">
            <div class="date-badge">
              <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
              <h3>${date}</h3>
            </div>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
              <span class="exam-count">${examEntries.length} exame${examEntries.length !== 1 ? 's' : ''} · ${Object.keys(byCategory).length} categoria${Object.keys(byCategory).length !== 1 ? 's' : ''}</span>
              <div class="result-actions">
                <button class="btn-copy" data-json='${escAttr(jsonStr)}'>
                  <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                  </svg>
                  Copiar JSON
                </button>
                <button class="btn-download" data-json='${escAttr(jsonStr)}' data-date="${date}">
                  <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                  Download
                </button>
              </div>
            </div>
          </div>

          <div class="exam-table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Exame</th>
                  <th>Valor</th>
                  <th>Unidade</th>
                  <th>Referência (adulto masc.)</th>
                </tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>

          <div class="json-toggle" id="toggle-${safeId}">
            <span>Ver JSON bruto</span>
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
          <div class="json-block" id="json-${safeId}">
            <pre>${syntaxHighlight(jsonStr)}</pre>
          </div>`;

        results.appendChild(card);

        /* JSON toggle */
        card.querySelector(`#toggle-${safeId}`).addEventListener('click', function () {
          this.classList.toggle('open');
          card.querySelector(`#json-${safeId}`).classList.toggle('open');
          this.querySelector('span').textContent = this.classList.contains('open') ? 'Ocultar JSON' : 'Ver JSON bruto';
        });

        /* copy */
        card.querySelector('.btn-copy').addEventListener('click', function () {
          navigator.clipboard.writeText(this.dataset.json).then(() => {
            this.classList.add('copied');
            this.querySelector('span') ? null : null;
            const orig = this.innerHTML;
            this.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Copiado!`;
            setTimeout(() => { this.innerHTML = orig; this.classList.remove('copied'); }, 2000);
          });
        });

        /* download */
        card.querySelector('.btn-download').addEventListener('click', function () {
          const blob = new Blob([this.dataset.json], { type: 'application/json' });
          const a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = `exames_${this.dataset.date}.json`;
          a.click();
        });
      });
    }

    function sortDates([a], [b]) {
      // dd-mm-aaaa → aaaa-mm-dd for comparison
      const toISO = d => {
        const p = d.split('-');
        return p.length === 3 ? `${p[2]}-${p[1]}-${p[0]}` : d;
      };
      return toISO(a).localeCompare(toISO(b));
    }

    function showError(msg) {
      results.innerHTML = `
        <div class="error-card">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p>${msg}</p>
        </div>`;
    }

    function showWarnings(errs) {
      const div = document.createElement('div');
      div.className = 'warn-card';
      div.innerHTML = `
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        <div>
          <strong>Alguns arquivos tiveram erro e foram ignorados:</strong>
          <ul>${errs.map(e => `<li>${e}</li>`).join('')}</ul>
        </div>`;
      results.appendChild(div);
    }

    function escAttr(str) {
      return str.replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
    }

    function syntaxHighlight(json) {
      return json
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/("(\\u[\dA-Fa-f]{4}|\\[^u]|[^"\\])*"(\s*:)?|true|false|null|-?\d+(\.\d+)?([eE][+-]?\d+)?)/g, match => {
          let cls = 'json-num';
          if (/^"/.test(match)) cls = /:$/.test(match) ? 'json-key' : 'json-str';
          else if (/true|false/.test(match)) cls = 'json-bool';
          else if (/null/.test(match)) cls = 'json-null';
          return `<span class="${cls}">${match}</span>`;
        });
    }
  </script>
</body>
</html>
